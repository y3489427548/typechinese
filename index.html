<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Type Chinese</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding-top:120px;
}

.card{
background:white;
padding:40px;
width:320px;
margin:auto;
border-radius:12px;
}

.hanzi{
font-size:40px;
font-weight:bold;
}

.pinyin{
color:#bbb;
margin-top:10px;
}

input{
font-size:20px;
padding:10px;
width:200px;
margin-top:20px;
}

.result{
margin-top:20px;
font-size:18px;
}

.structure{
margin-top:10px;
color:#666;
}

</style>
</head>

<body>

<div class="card">

<div class="hanzi">你好</div>

<div class="pinyin">ni hao</div>

<input id="input" placeholder="type pinyin">

<div class="result" id="result"></div>

<div class="structure" id="structure"></div>

</div>

<script>

let input = document.getElementById("input");

/* 键盘声音 */
let keySound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");

input.addEventListener("keyup", function(){

/* 每次打字播放声音 */
keySound.currentTime = 0;
keySound.play();

let value = input.value.toLowerCase();

if(value == "nihao" || value == "ni hao"){

document.getElementById("result").innerHTML="Hello";

document.getElementById("structure").innerHTML="Structure: Left + Right";

}

});

</script>

</body>
</html>
