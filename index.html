<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Type Chinese</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding-top:120px;
}

.card{
background:white;
padding:40px;
width:340px;
margin:auto;
border-radius:12px;
}

.hanzi{
font-size:40px;
font-weight:bold;
transition:0.3s;
}

.hanzi.big{
font-size:70px;
}

.pinyin{
color:#bbb;
margin-top:10px;
}

input{
font-size:20px;
padding:10px;
width:220px;
margin-top:20px;
}

.result{
margin-top:20px;
font-size:18px;
}

.structure{
margin-top:20px;
font-size:18px;
color:#444;
}

.parts{
margin-top:10px;
font-size:28px;
}

</style>
</head>

<body>

<div class="card">

<div id="hanzi" class="hanzi">你好</div>

<div class="pinyin">ni hao</div>

<input id="input" placeholder="type pinyin then press Enter">

<div class="result" id="result"></div>

<div class="structure" id="structure"></div>

<div class="parts" id="parts"></div>

</div>

<script>

let input = document.getElementById("input");
let hanzi = document.getElementById("hanzi");

input.addEventListener("keydown",function(e){

if(e.key === "Enter"){

let value = input.value.toLowerCase().replace(" ","");

if(value === "nihao"){

hanzi.classList.add("big");

document.getElementById("result").innerHTML="Hello";

document.getElementById("structure").innerHTML="Structure: Left + Right";

document.getElementById("parts").innerHTML="你 = 亻 + 尔<br>好 = 女 + 子";

}

}

});

</script>

</body>
</html>
