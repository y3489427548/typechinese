<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Type Chinese</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding-top:100px;
}
.card{
background:white;
padding:40px;
width:300px;
margin:auto;
border-radius:10px;
}
input{
font-size:20px;
padding:10px;
width:200px;
margin-top:10px;
}
.hint{
color:#bbb;
}
#chinese{
font-size:32px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h2 id="english">Hello</h2>

<p class="hint">ni hao</p>

<input id="input" placeholder="type pinyin"/>

<div id="chinese"></div>

</div>

<script>

let answer="ni hao"

let input=document.getElementById("input")

input.addEventListener("input",function(){

if(input.value.trim()==answer){

document.getElementById("chinese").innerText="你好"

}

})

</script>

</body>
</html>
