<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>HanType</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
text-align:center;
background:#f6f7fb;
padding-top:100px;
}

.card{
background:white;
padding:50px;
width:420px;
margin:auto;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.english{
font-size:32px;
font-weight:600;
color:#333;
}

.hanzi{
font-size:60px;
font-weight:700;
margin-top:6px;
}

.pinyin{
font-size:24px;
color:#bbb;
margin-top:6px;
}

.preview{
font-size:32px;
margin-top:20px;
letter-spacing:6px;
font-weight:700;
}

/* 新增结构样式 */

.structure{
margin-top:20px;
font-size:20px;
line-height:1.6;
color:#444;
}

input{
font-size:22px;
padding:12px;
width:260px;
margin-top:20px;
border-radius:10px;
border:2px solid #e5e7eb;
}

input:focus{
border-color:#3b82f6;
outline:none;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:18px;
color:#555;
}

.wordPreview{
display:flex;
justify-content:space-between;
color:#bbb;
font-size:18px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card">

<div class="topbar">
<div id="progress"></div>
<div id="score"></div>
<div id="streak"></div>
</div>

<div class="wordPreview">
<div id="prev" onclick="prevWord()" style="cursor:pointer"></div>
<div id="next" onclick="nextWordManual()" style="cursor:pointer"></div>
</div>

<div id="english" class="english"></div>
<div id="hanzi" class="hanzi"></div>
<div id="pinyin" class="pinyin"></div>

<input id="input" placeholder="type pinyin or hanzi then press Enter">

<div id="preview" class="preview"></div>

<!-- 新增结构区域 -->
<div id="structure" class="structure"></div>

</div>

<script>

/* 彩虹颜色 */

let colors=[
"#FF0000",
"#FF7F00",
"#FFD700",
"#00AA00",
"#00CED1",
"#0066FF",
"#8B00FF"
];

/* 词库 */

let words=[

{hanzi:"你好",pinyin:"nǐ hǎo",type:"nihao",english:"Hello",
structure:"Structure: Left + Right<br>你 = 亻 + 尔<br>好 = 女 + 子"},

{hanzi:"谢谢",pinyin:"xiè xie",type:"xiexie",english:"Thank you",
structure:"Structure: Left + Right<br>谢 = 讠 + 射"},

{hanzi:"再见",pinyin:"zài jiàn",type:"zaijian",english:"Goodbye",
structure:"Structure: Top + Bottom<br>再 = 一 + 冉<br>见 = 冂 + 儿"},

{hanzi:"请",pinyin:"qǐng",type:"qing",english:"Please",
structure:"Structure: Left + Right<br>请 = 讠 + 青"},

{hanzi:"对不起",pinyin:"duì bù qǐ",type:"duibuqi",english:"Sorry"},

{hanzi:"没关系",pinyin:"méi guān xi",type:"meiguanxi",english:"It's ok"},

{hanzi:"欢迎",pinyin:"huān yíng",type:"huanying",english:"Welcome"},

{hanzi:"早上好",pinyin:"zǎo shang hǎo",type:"zaoshanghao",english:"Good morning"},

{hanzi:"晚上好",pinyin:"wǎn shang hǎo",type:"wanshanghao",english:"Good evening"},

{hanzi:"晚安",pinyin:"wǎn ān",type:"wanan",english:"Good night",
structure:"Structure: Top + Bottom<br>安 = 宀 + 女"},

{hanzi:"中国",pinyin:"zhōng guó",type:"zhongguo",english:"China",
structure:"Structure: Surround<br>国 = 囗 + 玉"},

{hanzi:"美国",pinyin:"měi guó",type:"meiguo",english:"USA"},
{hanzi:"英国",pinyin:"yīng guó",type:"yingguo",english:"UK"},
{hanzi:"日本",pinyin:"rì běn",type:"riben",english:"Japan"},
{hanzi:"韩国",pinyin:"hán guó",type:"hanguo",english:"Korea"},
{hanzi:"法国",pinyin:"fǎ guó",type:"faguo",english:"France"},
{hanzi:"德国",pinyin:"dé guó",type:"deguo",english:"Germany"},
{hanzi:"加拿大",pinyin:"jiā ná dà",type:"jianada",english:"Canada"},
{hanzi:"澳大利亚",pinyin:"ào dà lì yà",type:"aodaliya",english:"Australia"},
{hanzi:"新加坡",pinyin:"xīn jiā pō",type:"xinjiapo",english:"Singapore"},

{hanzi:"爸爸",pinyin:"bà ba",type:"baba",english:"Father",
structure:"Structure: Top + Bottom<br>爸 = 父 + 巴"},

{hanzi:"妈妈",pinyin:"mā ma",type:"mama",english:"Mother",
structure:"Structure: Left + Right<br>妈 = 女 + 马"},

{hanzi:"哥哥",pinyin:"gē ge",type:"gege",english:"Brother"},
{hanzi:"姐姐",pinyin:"jiě jie",type:"jiejie",english:"Sister"},
{hanzi:"弟弟",pinyin:"dì di",type:"didi",english:"Younger brother"},
{hanzi:"妹妹",pinyin:"mèi mei",type:"meimei",english:"Younger sister"},
{hanzi:"儿子",pinyin:"ér zi",type:"erzi",english:"Son"},
{hanzi:"女儿",pinyin:"nǚ ér",type:"nver",english:"Daughter"},
{hanzi:"家人",pinyin:"jiā rén",type:"jiaren",english:"Family"},
{hanzi:"孩子",pinyin:"hái zi",type:"haizi",english:"Child",
structure:"Structure: Left + Right<br>孩 = 子 + 亥"}

];

/* 错题本 */

let wrongWords=[];

/* 游戏变量 */

let current;
let score=0;
let streak=0;
let index=0;
let currentIndex=0;
let input=document.getElementById("input");
let preview=document.getElementById("preview");

/* 新词 */

function nextWord(){

currentIndex=Math.floor(Math.random()*words.length);
current=words[currentIndex];

document.getElementById("hanzi").innerHTML=current.hanzi;
document.getElementById("pinyin").innerHTML=current.pinyin;
document.getElementById("english").innerHTML=current.english;

document.getElementById("structure").innerHTML=current.structure || "";

input.value="";
preview.innerHTML="";

index++;

document.getElementById("progress").innerHTML="Word "+index;
document.getElementById("score").innerHTML="Score "+score;
document.getElementById("streak").innerHTML="🔥 "+streak;

let prevIndex=currentIndex-1;
let nextIndex=currentIndex+1;

if(prevIndex<0) prevIndex=words.length-1;
if(nextIndex>=words.length) nextIndex=0;

document.getElementById("prev").innerHTML="← "+words[prevIndex].hanzi;
document.getElementById("next").innerHTML=words[nextIndex].hanzi+" →";

}

nextWord();

/* 彩虹输入 */

input.addEventListener("input",function(){

let text=input.value;
let html="";

for(let i=0;i<text.length;i++){

let color=colors[i%7];
html+="<span style='color:"+color+"'>"+text[i]+"</span>";

}

preview.innerHTML=html;

});

/* Enter判断 */

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let value=input.value.toLowerCase().replace(/\s/g,'');

if(value===current.type || value===current.hanzi){

score++;
streak++;

speakChinese(current.hanzi);

setTimeout(nextWord,700);

}else{

streak=0;
wrongWords.push(current);

input.style.border="2px solid red";

setTimeout(()=>{
input.style.border="2px solid #e5e7eb";
},600);

}

}

});

/* 中文发音 */

function speakChinese(text){

let speech=new SpeechSynthesisUtterance(text);

speech.lang="zh-CN";
speech.rate=0.9;

speechSynthesis.speak(speech);

}

/* 上一个 */

function prevWord(){

currentIndex--;

if(currentIndex<0){
currentIndex=words.length-1;
}

current=words[currentIndex];

document.getElementById("hanzi").innerHTML=current.hanzi;
document.getElementById("pinyin").innerHTML=current.pinyin;
document.getElementById("english").innerHTML=current.english;
document.getElementById("structure").innerHTML=current.structure || "";

}

/* 下一个 */

function nextWordManual(){

currentIndex++;

if(currentIndex>=words.length){
currentIndex=0;
}

current=words[currentIndex];

document.getElementById("hanzi").innerHTML=current.hanzi;
document.getElementById("pinyin").innerHTML=current.pinyin;
document.getElementById("english").innerHTML=current.english;
document.getElementById("structure").innerHTML=current.structure || "";

}

</script>

</body>

</html>
