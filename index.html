<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>HanType</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
text-align:center;
background:#f6f7fb;
padding-top:100px;
}

.card{
background:white;
padding:50px;
width:420px;
margin:auto;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.controls{
margin-bottom:15px;
}

.controls button{
margin:6px;
padding:8px 16px;
border-radius:12px;
border:none;
background:white;
cursor:pointer;
font-size:22px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.controls button:hover{
transform:scale(1.1);
}

.english{
font-size:32px;
font-weight:600;
color:#333;
}

.hanzi{
font-size:60px;
font-weight:700;
margin-top:6px;
}

.pinyin{
font-size:24px;
color:#bbb;
margin-top:6px;
}

.preview{
font-size:32px;
margin-top:20px;
letter-spacing:6px;
font-weight:700;
}

input{
font-size:22px;
padding:12px;
width:260px;
margin-top:20px;
border-radius:10px;
border:2px solid #e5e7eb;
}

input:focus{
border-color:#3b82f6;
outline:none;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:18px;
color:#555;
}

.wordPreview{
display:flex;
justify-content:space-between;
color:#bbb;
font-size:18px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card">

<div class="controls">

<button onclick="toggleSound()">📣</button>
<button onclick="toggleRainbow()">🌈</button>
<button onclick="toggleFavorite()">⭐</button>
<button onclick="toggleMistake()">📚</button>

</div>

<div class="topbar">
<div id="progress"></div>
<div id="score"></div>
<div id="streak"></div>
</div>

<div class="wordPreview">
<div id="prev"></div>
<div id="next"></div>
</div>

<div id="english" class="english"></div>
<div id="hanzi" class="hanzi"></div>
<div id="pinyin" class="pinyin"></div>

<input id="input" placeholder="type pinyin or hanzi then press Enter">

<div id="preview" class="preview"></div>

</div>

<script>

/* 开关变量 */

let soundOn=true;
let rainbowOn=true;

let favoriteWords=[];
let wrongWords=[];

/* 彩虹颜色 */

let colors=[
"#FF0000",
"#FF7F00",
"#FFD700",
"#00AA00",
"#00CED1",
"#0066FF",
"#8B00FF"
];

/* 词库 */

let words=[

{hanzi:"你好",pinyin:"nǐ hǎo",type:"nihao",english:"Hello"},
{hanzi:"谢谢",pinyin:"xiè xie",type:"xiexie",english:"Thank you"},
{hanzi:"再见",pinyin:"zài jiàn",type:"zaijian",english:"Goodbye"},
{hanzi:"请",pinyin:"qǐng",type:"qing",english:"Please"},
{hanzi:"对不起",pinyin:"duì bù qǐ",type:"duibuqi",english:"Sorry"},
{hanzi:"没关系",pinyin:"méi guān xi",type:"meiguanxi",english:"It's ok"},
{hanzi:"欢迎",pinyin:"huān yíng",type:"huanying",english:"Welcome"},
{hanzi:"早上好",pinyin:"zǎo shang hǎo",type:"zaoshanghao",english:"Good morning"},
{hanzi:"晚上好",pinyin:"wǎn shang hǎo",type:"wanshanghao",english:"Good evening"},
{hanzi:"晚安",pinyin:"wǎn ān",type:"wanan",english:"Good night"},

{hanzi:"中国",pinyin:"zhōng guó",type:"zhongguo",english:"China"},
{hanzi:"美国",pinyin:"měi guó",type:"meiguo",english:"USA"},
{hanzi:"英国",pinyin:"yīng guó",type:"yingguo",english:"UK"},
{hanzi:"日本",pinyin:"rì běn",type:"riben",english:"Japan"},
{hanzi:"韩国",pinyin:"hán guó",type:"hanguo",english:"Korea"},

{hanzi:"爸爸",pinyin:"bà ba",type:"baba",english:"Father"},
{hanzi:"妈妈",pinyin:"mā ma",type:"mama",english:"Mother"},
{hanzi:"哥哥",pinyin:"gē ge",type:"gege",english:"Brother"},
{hanzi:"姐姐",pinyin:"jiě jie",type:"jiejie",english:"Sister"},
{hanzi:"孩子",pinyin:"hái zi",type:"haizi",english:"Child"}

];

/* 游戏变量 */

let current;
let score=0;
let streak=0;
let index=0;

let input=document.getElementById("input");
let preview=document.getElementById("preview");

/* 新词 */

function nextWord(){

let randomIndex=Math.floor(Math.random()*words.length);

current=words[randomIndex];

document.getElementById("hanzi").innerHTML=current.hanzi;
document.getElementById("pinyin").innerHTML=current.pinyin;
document.getElementById("english").innerHTML=current.english;

input.value="";
preview.innerHTML="";

index++;

document.getElementById("progress").innerHTML="Word "+index;
document.getElementById("score").innerHTML="Score "+score;
document.getElementById("streak").innerHTML="🔥 "+streak;

}

nextWord();

/* 彩虹输入 */

input.addEventListener("input",function(){

let text=input.value;

let html="";

for(let i=0;i<text.length;i++){

let color=rainbowOn?colors[i%7]:"#333";

html+="<span style='color:"+color+"'>"+text[i]+"</span>";

}

preview.innerHTML=html;

});

/* Enter判断 */

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let value=input.value.toLowerCase().replace(/\s/g,'');

if(value===current.type || value===current.hanzi){

score++;
streak++;

if(soundOn){
speakChinese(current.hanzi);
}

setTimeout(nextWord,700);

}else{

streak=0;
wrongWords.push(current);

input.style.border="2px solid red";

setTimeout(()=>{
input.style.border="2px solid #e5e7eb";
},600);

}

}

});

/* 中文发音 */

function speakChinese(text){

let speech=new SpeechSynthesisUtterance(text);

speech.lang="zh-CN";
speech.rate=0.9;

speechSynthesis.speak(speech);

}

/* 按钮功能 */

function toggleSound(){
soundOn=!soundOn;
}

function toggleRainbow(){
rainbowOn=!rainbowOn;
}

function toggleFavorite(){
favoriteWords.push(current);
alert("⭐ saved");
}

function toggleMistake(){

if(wrongWords.length>0){
words=wrongWords;
index=0;
nextWord();
}

}

</script>

</body>

</html>
