<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Type Chinese</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding-top:120px;
}

.card{
background:white;
padding:40px;
width:380px;
margin:auto;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.hanzi{
font-size:44px;
font-weight:bold;
transition:0.3s;
position:relative;
}

.hanzi.big{
font-size:70px;
}

.pinyin{
color:#bbb;
font-size:26px;
margin-top:10px;
}

.preview{
font-size:28px;
margin-top:20px;
letter-spacing:4px;
}

input{
font-size:22px;
padding:12px;
width:240px;
margin-top:20px;
border-radius:6px;
border:1px solid #ccc;
}

.result{
margin-top:20px;
font-size:22px;
}

.structure{
margin-top:12px;
color:#666;
font-size:18px;
}

.parts{
margin-top:10px;
font-size:28px;
}

/* 彩虹动画 */

.rainbowFlash{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(
90deg,
red,
orange,
yellow,
green,
cyan,
blue,
violet
);
opacity:0.6;
animation:flash 0.8s ease;
}

@keyframes flash{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

</style>

</head>

<body>

<div class="card">

<div id="hanzi" class="hanzi">你好</div>

<div id="pinyin" class="pinyin">nǐ hǎo</div>

<input id="input" placeholder="type pinyin then press Enter">

<div id="preview" class="preview"></div>

<div class="result" id="result"></div>

<div class="structure" id="structure"></div>

<div class="parts" id="parts"></div>

</div>

<script>

let input=document.getElementById("input");
let preview=document.getElementById("preview");
let hanzi=document.getElementById("hanzi");

let answer="nihao";

let colors=[
"red",
"orange",
"gold",
"green",
"cyan",
"blue",
"violet"
];

// 键盘声音
let keySound=new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");

input.addEventListener("keydown",function(e){

keySound.currentTime=0;
keySound.play().catch(()=>{});

});

// 彩虹输入效果
input.addEventListener("input",function(){

let text=input.value;

let html="";

for(let i=0;i<text.length;i++){

let color=colors[i%7];

html+="<span style='color:"+color+"'>"+text[i]+"</span>";

}

preview.innerHTML=html;

});

// Enter确认
input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let value=input.value.toLowerCase().replace(" ","");

if(value===answer){

hanzi.classList.add("big");

// 彩虹闪过
let flash=document.createElement("div");
flash.className="rainbowFlash";
hanzi.appendChild(flash);

setTimeout(()=>{
flash.remove();
},800);

document.getElementById("result").innerHTML="Correct";

document.getElementById("structure").innerHTML=
"Structure: Left + Right";

document.getElementById("parts").innerHTML=
"你 = 亻 + 尔<br>好 = 女 + 子";

speakChinese("你好");

}

}

});

// 中文发音
function speakChinese(text){

let speech=new SpeechSynthesisUtterance(text);

speech.lang="zh-CN";

speech.rate=0.9;

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
