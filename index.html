<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Type Chinese</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding-top:120px;
}

.card{
background:white;
padding:40px;
width:380px;
margin:auto;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.hanzi{
font-size:46px;
font-weight:700;
transition:0.3s;
position:relative;
}

.hanzi.big{
font-size:72px;
}

.pinyin{
color:#bbb;
font-size:28px;
margin-top:10px;
}

.preview{
font-size:30px;
margin-top:20px;
letter-spacing:6px;
font-weight:700;
}

input{
font-size:22px;
padding:12px;
width:240px;
margin-top:20px;
border-radius:6px;
border:1px solid #ccc;
}

.result{
margin-top:20px;
font-size:22px;
}

.structure{
margin-top:12px;
color:#666;
font-size:18px;
}

.parts{
margin-top:10px;
font-size:28px;
}

/* 柔和彩虹扫过 */

.rainbowFlash{
position:absolute;
top:0;
left:-100%;
width:200%;
height:100%;

background:linear-gradient(
120deg,
rgba(255,0,0,0.25),
rgba(255,127,0,0.25),
rgba(255,215,0,0.25),
rgba(0,170,0,0.25),
rgba(0,206,209,0.25),
rgba(0,102,255,0.25),
rgba(139,0,255,0.25)
);

filter:blur(8px);

animation:rainbowMove 1s ease;
}

@keyframes rainbowMove{
0%{
transform:translateX(-100%);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateX(100%);
opacity:0;
}
}

</style>

</head>

<body>

<div class="card">

<div id="hanzi" class="hanzi">你好</div>

<div class="pinyin">nǐ hǎo</div>

<input id="input" placeholder="type pinyin then press Enter">

<div id="preview" class="preview"></div>

<div class="result" id="result"></div>

<div class="structure" id="structure"></div>

<div class="parts" id="parts"></div>

</div>

<script>

let input=document.getElementById("input");
let preview=document.getElementById("preview");
let hanzi=document.getElementById("hanzi");

let answer="nihao";

/* 彩虹标准色 */

let colors=[
"#FF0000",
"#FF7F00",
"#FFD700",
"#00AA00",
"#00CED1",
"#0066FF",
"#8B00FF"
];

/* 键盘声音 */

let keySound=new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");

input.addEventListener("keydown",function(){

keySound.currentTime=0;
keySound.play().catch(()=>{});

});


/* 彩虹输入 */

input.addEventListener("input",function(){

let text=input.value;

let html="";

for(let i=0;i<text.length;i++){

let color=colors[i%7];

html+="<span style='color:"+color+";font-weight:700'>"+text[i]+"</span>";

}

preview.innerHTML=html;

});


/* Enter确认 */

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let value=input.value.toLowerCase().replace(" ","");

if(value===answer){

hanzi.classList.add("big");

/* 彩虹扫过 */

let flash=document.createElement("div");

flash.className="rainbowFlash";

hanzi.appendChild(flash);

setTimeout(()=>{
flash.remove();
},1000);

document.getElementById("result").innerHTML="Correct";

document.getElementById("structure").innerHTML="Structure: Left + Right";

document.getElementById("parts").innerHTML=
"你 = 亻 + 尔<br>好 = 女 + 子";

speakChinese("你好");

}else{

input.style.border="3px solid red";

setTimeout(()=>{
input.style.border="1px solid #ccc";
},800);

}

}

});


/* 中文发音 */

function speakChinese(text){

let speech=new SpeechSynthesisUtterance(text);

speech.lang="zh-CN";

speech.rate=0.9;

speech.pitch=1;

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
